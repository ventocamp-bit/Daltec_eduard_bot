services:
  worker:
    build: .
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://eduard:${POSTGRES_PASSWORD:-eduard-postgres-local-change-me}@db:5432/eduard
    volumes:
      - ./data:/app/data
      - ./secrets:/app/secrets:ro
      - ./backups:/app/backups
    command: npm run poll
    depends_on:
      db:
        condition: service_healthy

  backup:
    build: .
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://eduard:${POSTGRES_PASSWORD:-eduard-postgres-local-change-me}@db:5432/eduard
    volumes:
      - ./backups:/app/backups
    command: sh -c "npm run backup:postgres; while true; do sleep $${POSTGRES_BACKUP_INTERVAL_SECONDS:-86400}; npm run backup:postgres; done"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: eduard
      POSTGRES_USER: eduard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eduard-postgres-local-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eduard -d eduard"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
