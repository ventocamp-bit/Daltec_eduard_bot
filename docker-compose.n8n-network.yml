services:
  web:
    build: .
    container_name: eduard-web
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      ADMIN_PORT: 3030
      NODE_ENV: production
      DATABASE_URL: postgres://eduard:${POSTGRES_PASSWORD:-eduard-postgres-local-change-me}@db:5432/eduard
    volumes:
      - ./data:/app/data
      - ./secrets:/app/secrets:ro
      - ./backups:/app/backups
    expose:
      - "3030"
    command: npm run admin
    depends_on:
      db:
        condition: service_healthy
    networks:
      - n8n_default
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3030/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build: .
    container_name: eduard-worker
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://eduard:${POSTGRES_PASSWORD:-eduard-postgres-local-change-me}@db:5432/eduard
    volumes:
      - ./data:/app/data
      - ./secrets:/app/secrets:ro
      - ./backups:/app/backups
    command: npm run poll
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_started
    networks:
      - n8n_default

  backup:
    build: .
    container_name: eduard-backup
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://eduard:${POSTGRES_PASSWORD:-eduard-postgres-local-change-me}@db:5432/eduard
    volumes:
      - ./backups:/app/backups
    command: sh -c "npm run backup:postgres; while true; do sleep $${POSTGRES_BACKUP_INTERVAL_SECONDS:-86400}; npm run backup:postgres; done"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - n8n_default

  db:
    image: postgres:16-alpine
    container_name: eduard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: eduard
      POSTGRES_USER: eduard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eduard-postgres-local-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - n8n_default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eduard -d eduard"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  n8n_default:
    external: true

volumes:
  postgres_data:
